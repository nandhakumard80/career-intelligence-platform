<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Career Intelligence Platform</title>
    <style>
      :root {
        color: #17202a;
        background: #f6f8fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        padding: 32px;
      }

      .workspace,
      .results {
        display: grid;
        gap: 20px;
        max-width: 1180px;
        margin: 0 auto;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr) 280px;
      }

      .results {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 20px;
      }

      .panel,
      .metric,
      .block {
        background: #ffffff;
        border: 1px solid #dde4ed;
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(31, 45, 61, 0.06);
      }

      .panel,
      .block {
        padding: 22px;
      }

      .header {
        align-items: flex-start;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .eyebrow {
        color: #287271;
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 6px;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 30px;
        line-height: 1.15;
        margin-bottom: 0;
      }

      h2 {
        font-size: 18px;
      }

      button {
        align-items: center;
        background: #2454a6;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 700;
        min-height: 42px;
        padding: 0 16px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      #clear {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        color: #17202a;
      }

      textarea {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        color: #17202a;
        font: inherit;
        min-height: 430px;
        padding: 16px;
        resize: vertical;
        width: 100%;
      }

      .metrics {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .metric {
        min-height: 110px;
        padding: 16px;
      }

      .metric span {
        color: #5d6978;
        display: block;
        font-size: 13px;
        margin-bottom: 8px;
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chips span {
        background: #f0f5fb;
        border: 1px solid #d9e3ef;
        border-radius: 999px;
        color: #2454a6;
        font-size: 13px;
        font-weight: 700;
        padding: 7px 10px;
      }

      .item {
        border: 1px solid #e4e9f0;
        border-radius: 8px;
        margin-top: 10px;
        padding: 14px;
      }

      .item p,
      .item small {
        color: #5d6978;
      }

      .error {
        color: #b42318;
        margin: 12px 0 0;
      }

      @media (max-width: 860px) {
        main {
          padding: 18px;
        }

        .workspace,
        .results {
          grid-template-columns: 1fr;
        }

        .header {
          flex-direction: column;
        }

        button {
          justify-content: center;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="workspace">
        <div class="panel">
          <div class="header">
            <div>
              <p class="eyebrow">Career Intelligence</p>
              <h1>AI resume and job match analyzer</h1>
            </div>
            <div class="actions">
              <button id="clear" type="button">Clear</button>
              <button id="analyze" type="button">Analyze</button>
            </div>
          </div>
          <textarea
            id="resume"
            placeholder="Paste or type your resume here after running the app. Include sections like Summary, Skills, Projects, Experience, and Education."
          ></textarea>
          <p class="error" id="error"></p>
        </div>

        <aside class="metrics">
          <div class="metric"><span>ATS Score</span><strong id="ats">--</strong></div>
          <div class="metric"><span>Best Match</span><strong id="best">--</strong></div>
          <div class="metric"><span>Skills Found</span><strong id="skillsCount">--</strong></div>
        </aside>
      </section>

      <section class="results" id="results" hidden>
        <div class="block">
          <h2>Detected Skills</h2>
          <div class="chips" id="skills"></div>
        </div>
        <div class="block">
          <h2>ATS Feedback</h2>
          <ul id="feedback"></ul>
        </div>
        <div class="block">
          <h2>Job Matches</h2>
          <div id="jobs"></div>
        </div>
        <div class="block">
          <h2>Learning Roadmap</h2>
          <div id="courses"></div>
        </div>
      </section>
    </main>

    <script>
      const analyzeButton = document.getElementById("analyze");
      const clearButton = document.getElementById("clear");
      const error = document.getElementById("error");
      const resumeInput = document.getElementById("resume");

      function renderList(id, items) {
        document.getElementById(id).innerHTML = items.map((item) => `<li>${item}</li>`).join("");
      }

      clearButton.addEventListener("click", () => {
        resumeInput.value = "";
        error.textContent = "";
        document.getElementById("results").hidden = true;
        document.getElementById("ats").textContent = "--";
        document.getElementById("best").textContent = "--";
        document.getElementById("skillsCount").textContent = "--";
        resumeInput.focus();
      });

      analyzeButton.addEventListener("click", async () => {
        analyzeButton.textContent = "Analyzing";
        analyzeButton.disabled = true;
        error.textContent = "";

        try {
          const response = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ resume_text: resumeInput.value }),
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Unable to analyze resume.");

          document.getElementById("results").hidden = false;
          document.getElementById("ats").textContent = `${data.ats_score}/100`;
          document.getElementById("best").textContent = data.job_matches[0]?.title || "--";
          document.getElementById("skillsCount").textContent = data.detected_skills.length;
          document.getElementById("skills").innerHTML = data.detected_skills.map((skill) => `<span>${skill}</span>`).join("");
          renderList("feedback", data.ats_feedback);

          document.getElementById("jobs").innerHTML = data.job_matches
            .map((job) => `<article class="item"><h3>${job.title}</h3><p>${job.company} - ${job.location}</p><strong>${job.match_score}% match</strong><br><small>Missing: ${job.missing_skills.join(", ") || "None"}</small></article>`)
            .join("");

          document.getElementById("courses").innerHTML = data.learning_recommendations
            .map((course) => `<article class="item"><h3>${course.title}</h3><p>${course.provider}</p><small>${course.project}</small></article>`)
            .join("");
        } catch (requestError) {
          error.textContent = requestError.message;
        } finally {
          analyzeButton.textContent = "Analyze";
          analyzeButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
